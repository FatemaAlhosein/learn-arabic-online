{% extends "base.html" %}

{% block title %}No role assigned — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="text-center py-5">
  <i class="bi bi-question-circle-fill display-4 text-warning"></i>
  <h2 class="mt-3">Your account has no role yet</h2>
  <p class="text-muted">
    An admin needs to assign a role (student, teacher, or parent) to
    your account before you can use the dashboard.
  </p>
  <a href="{% url 'home' %}" class="btn btn-primary mt-2">
    Back to home
  </a>
</div>
{% endblock %}
