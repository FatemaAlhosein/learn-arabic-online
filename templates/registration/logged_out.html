{% extends "base.html" %}

{% block title %}Signed out — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="text-center py-5">
  <i class="bi bi-check-circle-fill display-4 text-success"></i>
  <h2 class="mt-3">You've signed out</h2>
  <p class="text-muted">Thanks for visiting {{ SITE_NAME }}.</p>
  <a href="{% url 'home' %}" class="btn btn-primary mt-2">
    <i class="bi bi-house-door-fill me-1"></i>Back to home
  </a>
  <a href="{% url 'login' %}" class="btn btn-outline-secondary mt-2">
    Sign back in
  </a>
</div>
{% endblock %}
