{% extends "base.html" %}

{% block title %}Email sent — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="text-center py-5">
  <i class="bi bi-envelope-check-fill display-4 text-success"></i>
  <h2 class="mt-3">Check your email</h2>
  <p class="text-muted">
    If an account exists for that address, we've sent a link to reset
    your password.
  </p>
  <a href="{% url 'login' %}" class="btn btn-outline-secondary mt-3">
    Back to sign in
  </a>
</div>
{% endblock %}
